<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOC Translation Progress Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1B7FBD;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #112F91;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #00C3BF;
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }
        .card h3 { font-size: 2em; margin-bottom: 5px; }
        .card p { opacity: 0.9; }
        .languages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .language-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 5px solid #1B7FBD;
            height: 100%;
        }
        .language-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .language-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #112F91;
        }
        .status-badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .status-inprogress { background: #FFBA07; color: #000; }
        .status-notstarted { background: #FFD926; color: #000; }
        .status-na { background: #6c757d; color: white; }
        .progress-bar-container {
            margin: 10px 0;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .progress-bar {
            height: 25px;
            background: #e9ecef;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #00C3BF;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .progress-fill.zero { background: #dc3545; }
        .progress-fill.na { background: #6c757d; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #dee2e6;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #1B7FBD;
        }
        .stat-label {
            color: #666;
            font-size: 0.9em;
        }
        .alert {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .alert-danger {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        .two-column-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 30px 0;
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        .matrix-table th, .matrix-table td {
            padding: 12px;
            text-align: center;
            border: 1px solid #dee2e6;
        }
        .matrix-table th {
            background: #112F91;
            color: white;
            font-weight: bold;
        }
        .matrix-table tr:nth-child(even) {
            background: #f8f9fa;
        }
        .cell-complete { background: #d4edda !important; color: #155724; font-weight: bold; }
        .cell-started { background: #fff3cd !important; color: #856404; font-weight: bold; }
        .cell-notstarted { background: #f8d7da !important; color: #721c24; font-weight: bold; }
        .cell-na { background: #e2e3e5 !important; color: #383d41; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 MOC Translation Progress Dashboard</h1>
        <p class="subtitle">Real-time project status and metrics</p>

        <!-- Summary Cards -->
        <div class="summary-cards" id="summary-cards">
            <!-- Cards will be generated by JavaScript -->
        </div>

        <!-- Main 5 Process Overview -->
        <div style="background: #112F91; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            <h2 style="color: white; margin-bottom: 20px; text-align: center; font-size: 1.8em;">⚙️ MAIN 5 TRANSLATION PROCESSES</h2>
            <div id="main-processes" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;">
                <!-- Processes will be generated by JavaScript -->
            </div>
        </div>

        <!-- Process Flow Legend -->
        <div style="background: #e7f3ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #1B7FBD;">
            <h3 style="color: #112F91; margin-bottom: 10px;">📋 Translation Process Flows by Language</h3>
            <div id="process-flows">
                <!-- Process flows will be generated by JavaScript -->
            </div>
        </div>

        <!-- Language Sections Grid -->
        <div class="languages-grid" id="languages-grid">
            <!-- Languages will be generated by JavaScript -->
        </div> 
        <!-- End Languages Grid -->

        <!-- Bottom Section -->
        <!-- <div class="two-column-section">
            <div>
                <h2 style="margin: 0 0 20px 0; color: #112F91;">📊 Process Completion Matrix</h2>
        <table class="matrix-table" id="matrix-table"> -->
            <!-- Matrix will be generated by JavaScript -->
        <!-- </table>
            </div>
            <div>
                <h2 style="margin: 0 0 20px 0; color: #dc3545;">🚨 Critical Blockers</h2>
                <div id="blockers-container"> -->
                    <!-- Blockers will be generated by JavaScript -->
                <!-- </div>
            </div>
        </div> -->
        <!-- End Two Column Section -->

        <div style="margin-top: 30px; padding-top: 20px; border-top: 2px solid #dee2e6; text-align: center; color: #666;">
            <p id="footer-text">Dashboard generated from MOC Translation Status data</p>
            <p style="font-size: 0.9em; margin-top: 5px;" id="last-updated">Last updated: October 24, 2025</p>
        </div>
    </div>

    <!-- Load Data -->
    <script src="dashboard-data.js"></script>
    
    <!-- Render Dashboard -->
    <script src="dashboard-render.js"></script>
</body>
</html>
